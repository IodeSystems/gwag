# graphql-mesh config for the perf comparison.
#
# Two sources wired:
#   - hello_graphql: GraphQL handler pointing at hello-graphql (:50054)
#   - hello_openapi: OpenAPI handler pointing at hello-openapi (:50053)
# Proto isn't a native graphql-mesh source (their gRPC handler exists
# but requires .proto files + per-call config that doesn't fit this
# simple matrix). The proto scenario stays gwag-only.

serve:
  hostname: 0.0.0.0
  port: 14000

# Use the in-memory LRU cache (server-side). Mesh's default is
# `localforage`, but that package ships browser DB drivers and ends
# up nested under @graphql-mesh/cli/node_modules in current installs,
# where `include()` (which uses cwd-rooted jiti) can't resolve it.
# The in-memory cache is a top-level dep and avoids the whole path.
cache:
  inmemoryLRU: {}

sources:
  - name: hello_graphql
    handler:
      graphql:
        endpoint: http://localhost:50054/graphql

  - name: hello_openapi
    handler:
      openapi:
        source: http://localhost:50053/openapi.json
        endpoint: http://localhost:50053
