# bench/perf-scenarios.yaml — default scenario definitions for `bin/bench perf`.
#
# `bin/bench perf` reads this file, brings up the bench stack and the
# upstream services each scenario needs, runs the sweep, and renders
# docs/perf.md. Override with --config path/to/your.yaml to customise
# the sweep for regression work or non-default backends.
#
# The bundled set is a backend-format matrix: same GraphQL inbound,
# three different backend kinds hitting the same Hello operation —
# answers "what does my backend kind cost me?" head-to-head.
#
# YAML reference:
#   scenarios:                # list of scenarios; each runs as its own sweep
#     - name: <string>        # scenario label, surfaced in the report
#       description: <string> # one-line description for the section heading
#       services:             # upstream services the scenario needs registered
#         - kind: greeter     # managed kind (`bench service add greeter`)
#           delay: 100us      # optional --delay (greeter only)
#       target: <url>         # gateway endpoint to hit (default: graphql ingress)
#       query: <string>       # GraphQL query string the sweep fires each request
#       sweep:
#         steps: [...]        # target RPS rungs (ascending order)
#         reps: <int>         # reps per rung (rep 1 discarded as warm-up)
#         duration: <go-dur>  # per-rep wall time, e.g. 5s
#       upstream_latency: <go-dur>  # optional metadata stamp matching the
#                                   # `delay` configured on the upstream service.

scenarios:
  - name: proto
    description: GraphQL inbound → gRPC/proto backend (hello-proto); native gRPC dispatch
    services:
      - kind: hello-proto
    target: http://localhost:18080/api/graphql
    query: |
      { hello_proto { hello(name: "world") { greeting } } }
    sweep:
      steps: [1000, 5000, 10000, 20000, 30000, 40000, 50000, 60000]
      reps: 3
      duration: 5s

  - name: openapi
    description: GraphQL inbound → OpenAPI/HTTP backend (hello-openapi); HTTP/JSON dispatch
    services:
      - kind: hello-openapi
    target: http://localhost:18080/api/graphql
    query: |
      mutation { hello_openapi { Hello(body: { name: "world" }) { greeting } } }
    sweep:
      steps: [1000, 5000, 10000, 20000, 30000, 40000, 50000, 60000]
      reps: 3
      duration: 5s

  - name: graphql
    description: GraphQL inbound → GraphQL backend (hello-graphql); stitching forward
    services:
      - kind: hello-graphql
    target: http://localhost:18080/api/graphql
    query: |
      { hello_graphql { hello(name: "world") { greeting } } }
    sweep:
      steps: [1000, 5000, 10000, 20000, 30000, 40000, 50000, 60000]
      reps: 3
      duration: 5s
