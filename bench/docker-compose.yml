# Prometheus + Grafana for the gateway benchmark stack.
#
# Both run on the host network so:
#   1. Prometheus scrapes localhost:1808N gateway metrics directly
#      (no host.docker.internal gymnastics).
#   2. Grafana is reachable from another machine at <host-ip>:3001.
#
# Prometheus pulls its scrape targets from .run/targets.json, which
# scale.sh rewrites whenever a gateway is added or removed. Prom's
# file_sd refresh picks the change up within ~10s without a reload.
#
# Grafana provisioning auto-loads:
#   - the Prometheus datasource pointing at localhost:9090
#   - a default dashboard in grafana/dashboards/
#
# Starting port 3000 is taken on this box so Grafana binds 3001.

services:
  prometheus:
    image: prom/prometheus:v3.6.0
    container_name: bench-prometheus
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./.run:/bench-run:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Prometheus's standard :9090 collides on hosts that already
      # run a system Prometheus / node exporter; pick a high port
      # outside the common range. Grafana's datasource is hard-coded
      # to match.
      - --web.listen-address=:19090
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: bench-grafana
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: "3001"
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
