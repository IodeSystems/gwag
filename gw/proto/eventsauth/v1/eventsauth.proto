syntax = "proto3";

package gateway.eventsauth.v1;

option go_package = "github.com/iodesystems/go-api-gateway/gw/proto/eventsauth/v1;eventsauthv1";

// SubscriptionAuthorizer is the optional delegate the gateway calls
// when SignSubscriptionToken is invoked. Implement it in your authz
// service and register it with namespace "_events_auth" / version v1.
//
// The gateway looks up the registered pool, picks a replica via the
// usual least-in-flight path, and sends AuthorizeSign before HMAC-
// signing the token. If the response code is not OK, the gateway
// returns that code to the caller without minting a token.
service SubscriptionAuthorizer {
  rpc AuthorizeSign(AuthorizeSignRequest) returns (AuthorizeSignResponse);
}

message AuthorizeSignRequest {
  // Resolved NATS subject the token will sign.
  string channel = 1;

  // Wall-clock unix timestamp the gateway is about to embed in the
  // token. Lets the delegate reject tokens that arrive too late
  // relative to its own clock.
  int64 timestamp_unix = 2;

  // Requested validity window for the token. Currently informational;
  // the gateway-side SkewWindow bounds replay regardless.
  int64 ttl_seconds = 3;
}

message AuthorizeSignResponse {
  // Mirror values of gateway.controlplane.v1.SubscribeAuthCode.
  // Encoded as int32 here to avoid a cross-package proto import.
  // 1 = OK, 7 = DENIED, etc. See SubscribeAuthCode in control.proto.
  int32 code = 1;

  // Optional, surfaced to operators in logs. Never leaked to clients.
  string reason = 2;
}
