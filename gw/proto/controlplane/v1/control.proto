syntax = "proto3";

package gateway.controlplane.v1;

option go_package = "github.com/iodesystems/go-api-gateway/gw/proto/controlplane/v1;controlplanev1";

// ControlPlane is the API services use to register themselves with a
// running gateway. The flow:
//
//   1. Service starts its gRPC server on some addr.
//   2. Service calls Register with that addr and the list of services
//      it hosts (one address can host multiple services).
//   3. Service holds a heartbeat loop that calls Heartbeat at TtlSeconds/3.
//   4. On graceful shutdown, service calls Deregister.
//   5. If heartbeats stop coming for >TtlSeconds, the gateway evicts
//      the registration on its own.
service ControlPlane {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
  rpc ListRegistrations(ListRegistrationsRequest) returns (ListRegistrationsResponse);

  // ListPeers returns all gateway peers known to the cluster (alive
  // entries in the peers KV bucket). Useful for operators picking
  // which peer to forget.
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);

  // ForgetPeer removes a disconnected peer from the cluster's peer
  // bucket and shrinks the registry stream's replica count if the
  // remaining peer count is now lower. Refuses if the peer is still
  // alive (its KV entry hasn't expired) — operators must wait for
  // the heartbeat-miss window before forgetting.
  rpc ForgetPeer(ForgetPeerRequest) returns (ForgetPeerResponse);

  // ListServices returns the (namespace, version, hash, replica_count)
  // tuples currently live in the cluster. The hash is the canonical
  // FileDescriptorSet SHA256, suitable for cross-cluster parity
  // checks (dev/prod promotion gating).
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);

  // SignSubscriptionToken mints an HMAC token for a subscription
  // channel. Callers are typically privileged services that have
  // already authenticated the end user; the gateway optionally
  // consults a registered SubscriptionAuthorizer delegate before
  // signing.
  rpc SignSubscriptionToken(SignSubscriptionTokenRequest) returns (SignSubscriptionTokenResponse);
}

message RegisterRequest {
  // gRPC destination where the registered services live; passed
  // verbatim to grpc.NewClient on the gateway side.
  string addr = 1;

  // One or more services to mount at `addr`. The gateway exposes each
  // under its requested namespace. Collisions across registrations are
  // an error and reject the entire Register call.
  repeated ServiceBinding services = 2;

  // How long the gateway should retain the registration without seeing
  // a Heartbeat. 0 means "use server default" (currently 30s).
  uint32 ttl_seconds = 3;

  // Free-form. Echoed in ListRegistrations for operator debugging
  // (e.g. "greeter@gke-cluster-1@pod-abc"). Not used for routing.
  string instance_id = 4;
}

message ServiceBinding {
  // GraphQL namespace under which this service's RPCs appear. Defaults
  // to the proto file's stem if empty.
  string namespace = 1;

  // Standard FileDescriptorSet bytes (what `protoc -o` emits, or what
  // protodesc.ToFileDescriptorProto + Marshal produces). Must include
  // every transitive import the proto needs to type-check.
  //
  // Mutually exclusive with `openapi_spec`: a binding registers either
  // a proto-described gRPC service or an OpenAPI-described HTTP
  // service. Both unset / both set is an error.
  bytes file_descriptor_set = 2;

  // Optional: the specific file within file_descriptor_set whose
  // services should be mounted. Defaults to the LAST file in the set,
  // which is conventionally the dependent file rather than its imports.
  string file_name = 3;

  // Service version, e.g. "v1", "v2", "v10" (the leading "v" is
  // optional). Multiple versions of the same namespace coexist; the
  // highest live version is "latest" and surfaces flat under the
  // namespace. Older versions are addressable via name-disambiguated
  // fields ("<ns>_<vN>_<op>" / "<ns>_<vN>_<TypeName>") carrying
  // GraphQL @deprecated. Defaults to "v1" if empty. Honored for all
  // three binding forms (proto / openapi / graphql).
  string version = 4;

  // Raw OpenAPI 3.x spec bytes (JSON or YAML; kin-openapi parses
  // either). Mutually exclusive with `file_descriptor_set`. When set,
  // RegisterRequest.addr is the HTTP base URL the gateway dispatches
  // to (e.g. "https://billing.internal" or "http://localhost:8080").
  bytes openapi_spec = 5;

  // Endpoint URL of an upstream GraphQL service to ingest under this
  // namespace. Mutually exclusive with `file_descriptor_set` and
  // `openapi_spec`. The receiving gateway runs the canonical
  // introspection query against this endpoint at Register time,
  // mirrors every type with a `<namespace>_` prefix, and forwards
  // dispatches back to the same endpoint. RegisterRequest.addr is
  // ignored for GraphQL bindings — the endpoint URL carries the
  // dispatch destination too.
  string graphql_endpoint = 6;
}

message RegisterResponse {
  // Opaque token referenced by Heartbeat and Deregister. Treat as
  // unique per Register call.
  string registration_id = 1;

  // The gateway's effective TTL, in case the request specified 0.
  uint32 ttl_seconds = 2;
}

message HeartbeatRequest {
  string registration_id = 1;
}

message HeartbeatResponse {
  // True if the registration is still live. False means the gateway
  // already evicted it (network partition, restart, etc.) and the
  // service should re-Register from scratch.
  bool ok = 1;
}

message DeregisterRequest {
  string registration_id = 1;
}

message DeregisterResponse {}

message ListRegistrationsRequest {}

message ListRegistrationsResponse {
  repeated Registration registrations = 1;
}

message Registration {
  string registration_id = 1;
  string addr = 2;
  string instance_id = 3;
  uint32 ttl_seconds = 4;
  uint64 last_heartbeat_unix_ms = 5;
  repeated string namespaces = 6;
}

message ListPeersRequest {}

message ListPeersResponse {
  repeated Peer peers = 1;
}

message Peer {
  // Stable cluster identifier — what ForgetPeer takes.
  string node_id = 1;

  // Operator-friendly name (--node-name flag), if set.
  string name = 2;

  // Unix milliseconds when the peer first registered (this generation).
  // Used to detect re-joins after a forget.
  int64 joined_unix_ms = 3;
}

message ForgetPeerRequest {
  string node_id = 1;
}

message ForgetPeerResponse {
  // True if a peer entry was found and removed, false if the peer
  // was unknown (already forgotten or never seen).
  bool removed = 1;

  // Replica count after the forget. If unchanged, the cluster was
  // already at this size or below.
  uint32 new_replicas = 2;
}

message ListServicesRequest {}

message ListServicesResponse {
  repeated ServiceInfo services = 1;
  // Environment label of the cluster this gateway runs in (the
  // --environment flag). Empty for unlabelled clusters.
  string environment = 2;
}

message ServiceInfo {
  string namespace = 1;
  string version = 2;
  // SHA256 of the canonicalised FileDescriptorSet, hex-encoded.
  // Identical bytes ⇒ identical hash across clusters/protoc versions.
  string hash_hex = 3;
  // Number of live replicas backing this (namespace, version) pool.
  uint32 replica_count = 4;
}

// SubscribeAuthCode is the result of an attempted subscribe. Both the
// gateway-side HMAC verification and the SubscriptionAuthorizer
// delegate emit codes from this enum, so operators get consistent
// error semantics across both paths.
enum SubscribeAuthCode {
  SUBSCRIBE_AUTH_CODE_UNSPECIFIED        = 0;
  SUBSCRIBE_AUTH_CODE_OK                 = 1;

  // HMAC verification failures (gateway-side):
  SUBSCRIBE_AUTH_CODE_TOO_OLD            = 2;  // timestamp older than skew window
  SUBSCRIBE_AUTH_CODE_TOO_NEW            = 3;  // timestamp from the future
  SUBSCRIBE_AUTH_CODE_SIGNATURE_MISMATCH = 4;
  SUBSCRIBE_AUTH_CODE_MALFORMED          = 5;  // missing/garbled hmac or timestamp args
  SUBSCRIBE_AUTH_CODE_UNKNOWN_KID        = 6;  // key id not in active set (rotation)

  // Delegate-side outcomes:
  SUBSCRIBE_AUTH_CODE_DENIED             = 7;  // delegate said no
  SUBSCRIBE_AUTH_CODE_UNAVAILABLE        = 8;  // delegate didn't respond / errored
  SUBSCRIBE_AUTH_CODE_NOT_CONFIGURED     = 9;  // mode requires config that isn't set
}

message SignSubscriptionTokenRequest {
  // The exact NATS subject the token will sign — already-substituted,
  // e.g. "events.greeter.Greetings.alice". Wildcards ("*", ">") are
  // legal if the delegate authorizes them.
  string channel = 1;

  // How long the token should be considered valid (informational
  // for the verifier, which uses a wall-clock skew window).
  int64 ttl_seconds = 2;

  // Optional key id selecting which entry of
  // SubscriptionAuthOptions.Secrets to sign with. Empty (default) uses
  // the legacy `Secret` field and the legacy single-key payload
  // "<channel>\n<timestamp>". Non-empty kid signs the rotated payload
  // "<kid>\n<channel>\n<timestamp>". UNKNOWN_KID is returned when the
  // gateway has no secret for the given kid.
  string kid = 3;
}

message SignSubscriptionTokenResponse {
  // OK on success; otherwise the failure code (NOT_CONFIGURED if the
  // gateway has no secret, UNKNOWN_KID if the kid in the request has
  // no entry in Secrets, DENIED/UNAVAILABLE if the delegate refused).
  SubscribeAuthCode code = 1;

  // Base64-encoded HMAC. Empty when code != OK.
  string hmac = 2;

  // Unix timestamp embedded in the token. 0 when code != OK.
  int64 timestamp_unix = 3;

  // Operator-friendly explanation when code != OK.
  string reason = 4;

  // The key id this token was signed with. Echoes the request's kid;
  // empty for legacy single-key signing. Subscribers must pass this
  // back as the `kid` arg on the subscribe field for the gateway to
  // resolve the matching secret.
  string kid = 5;
}
