syntax = "proto3";

package hello.v1;

option go_package = "github.com/iodesystems/go-api-gateway/examples/multi/gen/hello/v1;hellov1";

// HelloService — the gRPC-native sibling of hello-openapi and
// hello-graphql. Single unary Hello operation, used as the format-
// native upstream for `bench traffic grpc --direct` so the gateway-
// vs-direct comparison is apples-to-apples in proto.
service HelloService {
  // Unary RPC; the direct-dial peer of the Hello operation in the
  // OpenAPI and GraphQL hello-* upstreams.
  rpc Hello(HelloRequest) returns (HelloResponse);
}

// HelloRequest is the input for the unary Hello rpc.
message HelloRequest {
  // Recipient name; echoed back in the greeting.
  string name = 1;
}

// HelloResponse is the unary Hello reply.
message HelloResponse {
  // Greeting line, e.g. "Hello, alice!".
  string greeting = 1;
}
