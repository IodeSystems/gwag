syntax = "proto3";

package library.v1;

option go_package = "github.com/iodesystems/go-api-gateway/examples/multi/gen/library/v1;libraryv1";

service LibraryService {
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc GetBook(GetBookRequest) returns (Book);
}

message ListBooksRequest {
  string author = 1;
}

message ListBooksResponse {
  repeated Book books = 1;
}

message GetBook {
  string id = 1;
}

message GetBookRequest {
  string id = 1;
}

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  int32 year = 4;
}
