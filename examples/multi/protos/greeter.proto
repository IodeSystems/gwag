syntax = "proto3";

package greeter.v1;

option go_package = "github.com/iodesystems/gwag/examples/multi/gen/greeter/v1;greeterv1";

// GreeterService demonstrates the three rpc shapes the gateway
// supports: unary (surfaces as a GraphQL query), server-streaming
// (surfaces as a GraphQL subscription over NATS), and client / bidi
// streaming (filtered out with a warning at registration).
service GreeterService {
  // Unary RPC. Surfaces as Query.greeter_hello in the gateway SDL.
  rpc Hello(HelloRequest) returns (HelloResponse);

  // Server-streaming → GraphQL subscription.
  // The request fields become subscription arguments; the stream
  // message becomes the event payload. NATS subject pattern is
  // events.greeter.Greetings.<name>.
  rpc Greetings(GreetingsFilter) returns (stream Greeting);

  // Client-streaming and bidi are filtered with a warning — the
  // gateway can't compose them as GraphQL operations.
  rpc Echo(stream HelloRequest) returns (stream HelloResponse);
}

// HelloRequest is the input for the unary Hello rpc.
message HelloRequest {
  // Recipient name; echoed back in the greeting.
  string name = 1;
}

// HelloResponse is the unary Hello reply.
message HelloResponse {
  // Greeting line, e.g. "Hello, alice!".
  string greeting = 1;
}

// GreetingsFilter is the input for the Greetings subscription. Each
// field becomes both a subscription arg in the gateway SDL and a
// wildcard segment in the NATS subject pattern.
message GreetingsFilter {
  // Filter by recipient name. "*" or empty matches all.
  string name = 1;
}

// Greeting is the message published to events.greeter.Greetings.<name>
// and forwarded to subscribed GraphQL clients via the gateway broker.
message Greeting {
  // Greeting text.
  string greeting = 1;
  // Recipient this greeting is for; matches the subject's <arg0>.
  string for_name = 2;
}
