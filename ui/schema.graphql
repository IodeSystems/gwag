  mutation: Mutation
}

type AdminMutationNamespace {
  deprecate(namespace: String!, version: String!, body: admin_DeprecateInBodyInput!): admin_DeprecateOutBody
  drain(body: admin_DrainInBodyInput!): admin_DrainOutBody
  forgetPeer(nodeId: String!): admin_ForgetOutBody
  retractStable(namespace: String!, body: admin_RetractStableInBodyInput!): admin_RetractStableOutBody
  signSubscriptionToken(body: admin_SignInBodyInput!): admin_SignOutBody
  stable: AdminStableMutationNamespace!
  undeprecate(namespace: String!, version: String!): admin_UndeprecateOutBody
  v1: AdminV1MutationNamespace!
}

type AdminQueryNamespace {
  deprecatedStats(window: String): admin_DeprecatedStatsOutBody
  listChannels: admin_ChannelsOutBody
  listInjectors: admin_InjectorsOutBody
  listPeers: admin_PeersOutBody
  listServices: admin_ServicesOutBody
  serviceStats(window: String, namespace: String!, version: String!): admin_ServiceStatsOutBody
  servicesHistory(window: String): admin_ServicesHistoryOutBody
  servicesStats(window: String): admin_ServicesStatsOutBody
  stable: AdminStableQueryNamespace!
  v1: AdminV1QueryNamespace!
}

type AdminStableMutationNamespace {
  deprecate(namespace: String!, version: String!, body: admin_DeprecateInBodyInput!): admin_DeprecateOutBody
  drain(body: admin_DrainInBodyInput!): admin_DrainOutBody
