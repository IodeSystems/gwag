type Gateway_Adminevents_V1_ServiceChange {
  action: Gateway_Adminevents_V1_ServiceChange_Action
  addr: String
  namespace: String
  """
   Pool replica count after the change (0 when the pool was
   destroyed entirely).
  """
  replicaCount: Int
  """ Wall-clock timestamp the gateway applied the change."""
  timestampUnixMs: String
  version: String
}

enum Gateway_Adminevents_V1_ServiceChange_Action {
  ACTION_DEREGISTERED
  ACTION_REGISTERED
  ACTION_UNSPECIFIED
}

"""Untyped JSON value (used as a fallback for OpenAPI schemas the gateway can't map exactly)."""
scalar JSON

"""64-bit integer encoded as a decimal string. OpenAPI integer fields with format=int64/uint64 land here; graphql-go's built-in Int is signed 32-bit and would lose precision (or null out entirely) for values above 2^31."""
scalar Long

type Mutation {
  admin: AdminMutationNamespace!
}

type Query {
  admin: AdminQueryNamespace!
}

type Subscription {
  """
   WatchServices yields a ServiceChange every time a registry
   entry is added, removed, or replaced. Optional namespace
   filter selects a single namespace; empty matches all.
  """
  admin_events_stable_watchServices(
    """
     Filter to a single namespace; empty / unset → all namespaces.
     Translates into NATS subject component (so client-side wildcard
     matching is just NATS subject hierarchy).
    """
    namespace: String
  ): Gateway_Adminevents_V1_ServiceChange
  """
   WatchServices yields a ServiceChange every time a registry
   entry is added, removed, or replaced. Optional namespace
   filter selects a single namespace; empty matches all.
  """
  admin_events_watchServices(
    """
     Filter to a single namespace; empty / unset → all namespaces.
     Translates into NATS subject component (so client-side wildcard
     matching is just NATS subject hierarchy).
    """
    namespace: String
  ): Gateway_Adminevents_V1_ServiceChange
}

"""The `Upload` scalar represents a file streamed in via the graphql-multipart-request-spec wire format (https://github.com/jaydenseric/graphql-multipart-request-spec). Input-only: serialization back to JSON returns null."""
scalar Upload

