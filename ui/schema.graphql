schema {
  query: Query
  mutation: Mutation
}

"""64-bit integer encoded as a decimal string. OpenAPI integer fields with format=int64/uint64 land here; graphql-go's built-in Int is signed 32-bit and would lose precision (or null out entirely) for values above 2^31."""
scalar Long

type Mutation {
  admin_drain(body: admin_DrainInBodyInput!): admin_DrainOutBody
  admin_forgetPeer(nodeId: String!): admin_ForgetOutBody
  admin_signSubscriptionToken(body: admin_SignInBodyInput!): admin_SignOutBody
}

type Query {
  admin_listChannels: admin_ChannelsOutBody
  admin_listPeers: admin_PeersOutBody
  admin_listServices: admin_ServicesOutBody
}

type admin_ChannelInfo {
  consumers: Long!
  subject: String!
}

type admin_ChannelsOutBody {
  channels: [admin_ChannelInfo]!
}

input admin_DrainInBodyInput {
  timeoutSeconds: Long
}

type admin_DrainOutBody {
  activeStreams: Long!
  drained: Boolean!
  reason: String
}

type admin_ForgetOutBody {
  newReplicas: Int!
  removed: Boolean!
}

type admin_PeerInfo {
  joinedUnixMs: Long!
  name: String
  nodeId: String!
}

type admin_PeersOutBody {
  peers: [admin_PeerInfo]!
}

type admin_ServiceInfo {
  hashHex: String!
  namespace: String!
  replicaCount: Int!
  version: String!
}

type admin_ServicesOutBody {
  environment: String
  services: [admin_ServiceInfo]!
}

input admin_SignInBodyInput {
  channel: String!
  kid: String
  ttlSeconds: Long!
}

type admin_SignOutBody {
  code: String!
  hmac: String
  kid: String
  reason: String
  timestampUnix: Long
}
