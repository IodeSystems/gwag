  serviceStats(namespace: String!, version: String!, window: String): admin_ServiceStatsOutBody
  servicesHistory(window: String): admin_ServicesHistoryOutBody
  servicesStats(window: String): admin_ServicesStatsOutBody
}

"""64-bit integer encoded as a decimal string. OpenAPI integer fields with format=int64/uint64 land here; graphql-go's built-in Int is signed 32-bit and would lose precision (or null out entirely) for values above 2^31."""
scalar Long

type Mutation {
  admin: AdminMutationNamespace!
}

type Query {
  admin: AdminQueryNamespace!
}

type admin_CallerStatsRow {
  caller: String!
  count: Long!
  okCount: Long!
  p50Millis: Long!
  p95Millis: Long!
  p99Millis: Long!
  throughput: Float!
}

type admin_ChannelInfo {
  consumers: Long!
