}

type admin_ChannelsOutBody {
  channels: [admin_ChannelInfo]!
}

input admin_DeprecateInBodyInput {
  reason: String!
}

type admin_DeprecateOutBody {
  _void: String
}

type admin_DeprecatedMethodRow {
  callers: [admin_CallerStatsRow]!
