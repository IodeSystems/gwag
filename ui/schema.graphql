  serviceStats(namespace: String!, version: String!, window: String): admin_ServiceStatsOutBody
  servicesHistory(window: String): admin_ServicesHistoryOutBody
  servicesStats(window: String): admin_ServicesStatsOutBody
}

type AdminV1MutationNamespace {
  deprecate(body: admin_DeprecateInBodyInput!, namespace: String!, version: String!): admin_DeprecateOutBody
  drain(body: admin_DrainInBodyInput!): admin_DrainOutBody
  forgetPeer(nodeId: String!): admin_ForgetOutBody
  retractStable(namespace: String!, body: admin_RetractStableInBodyInput!): admin_RetractStableOutBody
  signSubscriptionToken(body: admin_SignInBodyInput!): admin_SignOutBody
