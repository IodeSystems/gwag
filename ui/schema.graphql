schema {
  query: Query
  mutation: Mutation
}

type AdminMutationNamespace {
  drain(body: admin_DrainInBodyInput!): admin_DrainOutBody
  forgetPeer(nodeId: String!): admin_ForgetOutBody
  signSubscriptionToken(body: admin_SignInBodyInput!): admin_SignOutBody
  stable: AdminStableMutationNamespace!
  v1: AdminV1MutationNamespace!
}

type AdminQueryNamespace {
  listChannels: admin_ChannelsOutBody
  listInjectors: admin_InjectorsOutBody
  listPeers: admin_PeersOutBody
  listServices: admin_ServicesOutBody
  stable: AdminStableQueryNamespace!
  v1: AdminV1QueryNamespace!
}

type AdminStableMutationNamespace {
  drain(body: admin_DrainInBodyInput!): admin_DrainOutBody
  forgetPeer(nodeId: String!): admin_ForgetOutBody
  signSubscriptionToken(body: admin_SignInBodyInput!): admin_SignOutBody
}

type AdminStableQueryNamespace {
  listChannels: admin_ChannelsOutBody
  listInjectors: admin_InjectorsOutBody
  listPeers: admin_PeersOutBody
  listServices: admin_ServicesOutBody
}

type AdminV1MutationNamespace {
  drain(body: admin_DrainInBodyInput!): admin_DrainOutBody
  forgetPeer(nodeId: String!): admin_ForgetOutBody
  signSubscriptionToken(body: admin_SignInBodyInput!): admin_SignOutBody
}

type AdminV1QueryNamespace {
  listChannels: admin_ChannelsOutBody
  listInjectors: admin_InjectorsOutBody
  listPeers: admin_PeersOutBody
  listServices: admin_ServicesOutBody
}

"""64-bit integer encoded as a decimal string. OpenAPI integer fields with format=int64/uint64 land here; graphql-go's built-in Int is signed 32-bit and would lose precision (or null out entirely) for values above 2^31."""
scalar Long

type Mutation {
  admin: AdminMutationNamespace!
}

type Query {
  admin: AdminQueryNamespace!
}

type admin_ChannelInfo {
  consumers: Long!
  subject: String!
}

type admin_ChannelsOutBody {
  channels: [admin_ChannelInfo]!
}

input admin_DrainInBodyInput {
  timeoutSeconds: Long
}

type admin_DrainOutBody {
  activeStreams: Long!
  drained: Boolean!
  reason: String
}

type admin_ForgetOutBody {
  newReplicas: Int!
  removed: Boolean!
}

type admin_InjectorInfo {
  headerName: String
  hide: Boolean!
  kind: String!
  landings: [admin_InjectorLandingInfo]!
  nullable: Boolean!
  path: String
  registeredAt: admin_RegisteredAtInfo!
  state: String!
  typeName: String
}

type admin_InjectorLandingInfo {
  argName: String
  fieldName: String
  headerName: String
  kind: String!
  namespace: String
  op: String
  typeName: String
  version: String
}

type admin_InjectorsOutBody {
  injectors: [admin_InjectorInfo]!
}

type admin_PeerInfo {
  joinedUnixMs: Long!
  name: String
  nodeId: String!
}

type admin_PeersOutBody {
  peers: [admin_PeerInfo]!
}

type admin_RegisteredAtInfo {
  file: String
  function: String
  line: Long
}

type admin_ServiceInfo {
  hashHex: String!
  namespace: String!
  replicaCount: Int!
  version: String!
}

type admin_ServicesOutBody {
  environment: String
  services: [admin_ServiceInfo]!
}

input admin_SignInBodyInput {
  channel: String!
  kid: String
  ttlSeconds: Long!
}

type admin_SignOutBody {
  code: String!
  hmac: String
  kid: String
  reason: String
  timestampUnix: Long
}
