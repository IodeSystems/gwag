# Operations consumed by the React UI. graphql-codegen reads these
# along with src/**/*.tsx and emits typed functions in
# src/api/gateway.ts. Add new operations here, run `pnpm run codegen`,
# then import sdk.<OperationName> from '@/api/client'.
#
# Admin operations live under the `admin` namespace container — the
# IR renderer nests every Query/Mutation namespace, so the `admin`
# field on Query / Mutation returns an Admin{Query,Mutation}Namespace
# object whose fields are the actual operations. Subscriptions stay
# flat (graphql-go forbids nested objects under Subscription).

query Dashboard($window: String!) {
  admin {
    servicesHistory(window: $window) {
      window
      services {
        namespace
        version
        buckets {
          startUnixSec
          durationSec
          count
          okCount
          p50Millis
          p95Millis
          p99Millis
        }
      }
    }
  }
}

query Services {
  admin {
    listServices {
      services {
        namespace
        version
        hashHex
        replicaCount
        manualDeprecationReason
      }
      stableVN {
        namespace
        vN
      }
    }
    servicesStats(window: "24h") {
      window
      services {
        namespace
        version
        count
        okCount
        throughput
        p50Millis
        p95Millis
        p99Millis
      }
    }
  }
}

query ServiceStats($namespace: String!, $version: String!) {
  admin {
    serviceStats(namespace: $namespace, version: $version, window: "24h") {
      window
      methods {
        method
        caller
        count
        okCount
        throughput
        p50Millis
        p95Millis
        p99Millis
      }
    }
  }
}

query DeprecatedStats {
  admin {
    deprecatedStats(window: "24h") {
      window
      services {
        namespace
        version
        manualReason
        autoReason
        totalCount
        totalThroughput
        methods {
          method
          count
          okCount
          throughput
          p50Millis
          p95Millis
          p99Millis
          callers {
            caller
            count
            okCount
            throughput
            p50Millis
            p95Millis
            p99Millis
          }
        }
      }
    }
  }
}

mutation Deprecate($namespace: String!, $version: String!, $reason: String!) {
  admin {
    deprecate(
      namespace: $namespace
      version: $version
      body: { reason: $reason }
    ) {
      __typename
    }
  }
}

mutation Undeprecate($namespace: String!, $version: String!) {
  admin {
    undeprecate(namespace: $namespace, version: $version) {
      priorReason
    }
  }
}

mutation RetractStable($namespace: String!, $targetVN: Int!) {
  admin {
    retractStable(namespace: $namespace, body: { targetVN: $targetVN }) {
      priorVN
      newVN
    }
  }
}

query Peers {
  admin {
    listPeers {
      peers {
        nodeId
        name
        joinedUnixMs
      }
    }
  }
}

query Injectors {
  admin {
    listInjectors {
      injectors {
        kind
        typeName
        path
        headerName
        hide
        nullable
        state
        registeredAt {
          file
          line
          function
        }
        landings {
          kind
          namespace
          version
          op
          typeName
          fieldName
          argName
          headerName
        }
      }
    }
  }
}

mutation ForgetPeer($nodeId: String!) {
  admin {
    forgetPeer(nodeId: $nodeId) {
      removed
      newReplicas
    }
  }
}
