# Operations consumed by the React UI. graphql-codegen reads these
# along with src/**/*.tsx and emits typed functions in
# src/api/gateway.ts. Add new operations here, run `pnpm run codegen`,
# then import sdk.<OperationName> from '@/api/client'.

query Dashboard {
  admin_listPeers {
    peers {
      nodeId
    }
  }
  admin_listServices {
    environment
    services {
      namespace
      version
    }
  }
}

query Services {
  admin_listServices {
    environment
    services {
      namespace
      version
      hashHex
      replicaCount
    }
  }
}

query Peers {
  admin_listPeers {
    peers {
      nodeId
      name
      joinedUnixMs
    }
  }
}

mutation ForgetPeer($nodeId: String!) {
  admin_forgetPeer(nodeId: $nodeId) {
    removed
    newReplicas
  }
}
